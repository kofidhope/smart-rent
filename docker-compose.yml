version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: smart-rent-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smart-rent-network

volumes:
  postgres_data:

networks:
  smart-rent-network:
    driver: bridge